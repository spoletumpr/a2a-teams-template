{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "a2a-teams-template.fullname" . }}
  labels:
    {{- include "a2a-teams-template.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "a2a-teams-template.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.containerPort }}
  egress:
    {{- if .Values.networkPolicy.egressCidrs }}
    {{- range .Values.networkPolicy.egressCidrs }}
    - to:
        - ipBlock:
            cidr: {{ . | quote }}
    {{- end }}
    {{- else }}
    - {}
    {{- end }}
{{- end }}
