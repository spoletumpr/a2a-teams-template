replicaCount: 1

image:
  repository: ghcr.io/example/a2a-teams-template
  tag: "0.1.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true

service:
  type: ClusterIP
  port: 80

containerPort: 3978

config:
  kagentA2aUrl: "http://kagent-controller.kagent.svc.cluster.local:8083/api/a2a/kagent/k8s-agent"
  microsoftAppId: ""
  microsoftAppTenantId: ""
  microsoftAppType: "SingleTenant"
  teamsTenantAllowlist: ""
  teamsMentionOnly: "true"
  teamsAllowOutboundMentions: "false"
  kagentForwardUserId: "false"
  logLevel: "info"

existingSecret:
  name: ""
  microsoftAppPasswordKey: "MICROSOFT_APP_PASSWORD"

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: a2a-teams-template.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

livenessProbe:
  httpGet:
    path: /healthz
    port: http
readinessProbe:
  httpGet:
    path: /healthz
    port: http

networkPolicy:
  enabled: false
  egressCidrs: []

nodeSelector: {}
tolerations: []
affinity: {}
